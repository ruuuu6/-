<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>色彩敏銳度大挑戰 - 區辨訓練產生器</title>
    
    <!-- 引入 PDF 轉換套件 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+TC:wght@400;700;900&display=swap');

        :root {
            --primary: #6366f1;
            --bg-page: #f8fafc;
        }

        body {
            font-family: 'Noto Sans TC', 'Inter', sans-serif;
            background-color: var(--bg-page);
        }

        /* A4 預覽樣式 */
        .sheet-container {
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            margin: 20px auto;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .color-tile {
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* 答案標記：僅在解答頁顯示 */
        .ans-marker {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50%;
            height: 50%;
            border: 4px solid white;
            border-radius: 50%;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.3);
        }

        .show-answer .ans-marker {
            display: block;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            .sheet-container { 
                margin: 0; 
                box-shadow: none; 
                page-break-after: always;
            }
        }

        /* 控制面板懸浮感 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>

<div class="no-print glass-panel sticky top-0 z-50 p-6">
    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-2xl font-black text-indigo-600 flex items-center gap-2">
                    🎨 色彩敏銳度區辨訓練產生器
                </h1>
                <p class="text-slate-500 text-sm">設計者：鍾孟修 職能治療師 | 專為視知覺與專注力設計</p>
            </div>
            <div class="flex gap-2">
                <button onclick="generateWorkout()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-full font-bold transition transform active:scale-95">
                    ✨ 重新生成
                </button>
                <button onclick="downloadPDF()" id="pdfBtn" class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-2 rounded-full font-bold transition">
                    📥 下載 PDF
                </button>
                <button onclick="window.print()" class="bg-slate-700 hover:bg-slate-800 text-white px-6 py-2 rounded-full font-bold transition">
                    🖨️ 直接列印
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
            <div class="flex flex-col">
                <label class="text-xs font-bold text-slate-500 mb-1">題目難度 (色差程度)</label>
                <select id="difficulty" class="border rounded-lg p-2 text-sm focus:ring-2 ring-indigo-200 outline-none">
                    <option value="easy">初階 (色差明顯 15%)</option>
                    <option value="medium" selected>進階 (微妙色差 8%)</option>
                    <option value="hard">專業 (極細微色差 4%)</option>
                </select>
            </div>
            <div class="flex flex-col">
                <label class="text-xs font-bold text-slate-500 mb-1">矩陣大小 (題目規模)</label>
                <select id="gridSize" class="border rounded-lg p-2 text-sm focus:ring-2 ring-indigo-200 outline-none">
                    <option value="3">3 x 3 (基礎訓練)</option>
                    <option value="4" selected>4 x 4 (標準強度)</option>
                    <option value="5">5 x 5 (視覺搜尋挑戰)</option>
                </select>
            </div>
            <div class="flex flex-col">
                <label class="text-xs font-bold text-slate-500 mb-1">生成題目數量</label>
                <input type="number" id="taskCount" value="4" min="1" max="8" class="border rounded-lg p-2 text-sm">
            </div>
            <div class="flex flex-col">
                <label class="text-xs font-bold text-slate-500 mb-1">解答設定</label>
                <select id="showAns" class="border rounded-lg p-2 text-sm">
                    <option value="no">僅產生測驗卷</option>
                    <option value="yes" selected>附帶解答頁</option>
                </select>
            </div>
        </div>
    </div>
</div>

<div id="output" class="py-10 flex flex-col items-center gap-10">
    <!-- 內容將由 JS 動態生成 -->
</div>

<div id="hidden-capture" style="position: absolute; left: -9999px; top: 0;"></div>

<script>
    function getRandomHSL() {
        const h = Math.floor(Math.random() * 360);
        const s = 40 + Math.floor(Math.random() * 40); // 飽和度 40-80%
        const l = 45 + Math.floor(Math.random() * 20); // 亮度 45-65%
        return { h, s, l };
    }

    function getVariantHSL(base, diffLevel) {
        let diff = 15;
        if (diffLevel === 'medium') diff = 8;
        if (diffLevel === 'hard') diff = 4;

        // 隨機選擇調整 H, S 或 L 其中之一
        const type = Math.floor(Math.random() * 3);
        let nh = base.h, ns = base.s, nl = base.l;

        if (type === 0) nh = (base.h + diff * 2) % 360;
        else if (type === 1) ns = base.s > 50 ? base.s - diff : base.s + diff;
        else nl = base.l > 50 ? base.l - diff : base.l + diff;

        return { h: nh, s: ns, l: nl };
    }

    function hslToCss(hsl) {
        return `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
    }

    function renderSheet(isAnswerPage, tasksData) {
        const container = document.createElement('div');
        container.className = 'sheet-container ' + (isAnswerPage ? 'show-answer' : '');
        
        const header = `
            <div class="border-b-4 border-indigo-600 pb-4 mb-6 flex justify-between items-end">
                <div>
                    <h2 class="text-3xl font-black text-slate-800 tracking-tight">色彩敏銳度與區辨訓練 ${isAnswerPage ? '<span class="text-orange-500">(解答)</span>' : ''}</h2>
                    <p class="text-slate-500 font-bold mt-1">任務：請在每一組色塊中，圈出那個「與眾不同」的顏色。</p>
                </div>
                <div class="text-right text-sm font-bold text-slate-400">
                    日期：________ / 姓名：________
                </div>
            </div>
        `;

        let tasksHtml = '<div class="grid grid-cols-2 gap-x-12 gap-y-12 flex-grow">';
        
        tasksData.forEach((task, idx) => {
            const gridCols = `grid-template-columns: repeat(${task.size}, 1fr);`;
            let tilesHtml = '';
            
            for (let i = 0; i < task.size * task.size; i++) {
                const isOdd = (i === task.oddIndex);
                const color = isOdd ? hslToCss(task.oddColor) : hslToCss(task.baseColor);
                tilesHtml += `
                    <div class="relative">
                        <div class="color-tile shadow-sm" style="background-color: ${color}"></div>
                        ${isOdd ? '<div class="ans-marker"></div>' : ''}
                    </div>
                `;
            }

            tasksHtml += `
                <div class="flex flex-col">
                    <div class="mb-2 font-black text-indigo-500 text-lg italic">Question ${idx + 1}</div>
                    <div class="grid gap-2 p-3 bg-slate-50 rounded-2xl border-2 border-slate-100" style="${gridCols}">
                        ${tilesHtml}
                    </div>
                </div>
            `;
        });

        tasksHtml += '</div>';

        const footer = `
            <div class="mt-8 pt-4 border-t border-slate-200 flex justify-between items-center text-xs text-slate-400 font-bold">
                <div>© 語文大腦體操 - 視覺復健系列</div>
                <div>難度：${document.getElementById('difficulty').value.toUpperCase()} | 矩陣：${document.getElementById('gridSize').value}x${document.getElementById('gridSize').value}</div>
            </div>
        `;

        container.innerHTML = header + tasksHtml + footer;
        return container;
    }

    function generateWorkout() {
        const output = document.getElementById('output');
        const diffLevel = document.getElementById('difficulty').value;
        const size = parseInt(document.getElementById('gridSize').value);
        const count = parseInt(document.getElementById('taskCount').value);
        const showAns = document.getElementById('showAns').value;

        output.innerHTML = '<p class="text-indigo-600 font-bold animate-pulse">正在精準調色中...</p>';

        setTimeout(() => {
            output.innerHTML = '';
            const tasksData = [];

            // 預先生成數據
            for (let i = 0; i < count; i++) {
                const baseColor = getRandomHSL();
                const oddColor = getVariantHSL(baseColor, diffLevel);
                const oddIndex = Math.floor(Math.random() * (size * size));
                tasksData.push({ baseColor, oddColor, oddIndex, size });
            }

            // 渲染題目頁
            output.appendChild(renderSheet(false, tasksData));

            // 如果需要，渲染解答頁
            if (showAns === 'yes') {
                output.appendChild(renderSheet(true, tasksData));
            }
        }, 300);
    }

    async function downloadPDF() {
        const btn = document.getElementById('pdfBtn');
        const sheets = document.querySelectorAll('.sheet-container');
        if (sheets.length === 0) return;

        btn.disabled = true;
        btn.innerText = "⏳ 處理中...";

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const hidden = document.getElementById('hidden-capture');

        for (let i = 0; i < sheets.length; i++) {
            const clone = sheets[i].cloneNode(true);
            hidden.appendChild(clone);
            
            const canvas = await html2canvas(clone, { 
                scale: 2, 
                useCORS: true,
                logging: false 
            });
            
            const imgData = canvas.toDataURL('image/jpeg', 0.95);
            if (i > 0) pdf.addPage();
            pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
            hidden.removeChild(clone);
        }

        pdf.save('色彩敏銳度訓練卷.pdf');
        btn.disabled = false;
        btn.innerText = "📥 下載 PDF";
    }

    window.onload = generateWorkout;
</script>

</body>
</html>
